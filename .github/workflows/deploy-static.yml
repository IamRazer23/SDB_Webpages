name: Deploy estático (Cloudflare Pages)

# Genera el sitio estático desde Laravel (leyendo Supabase) y lo publica en
# Cloudflare Pages. Cada branch obtiene su propia URL de preview;
# `main` es producción. Así manejas versiones por branch de GitHub.

on:
  push:
    branches: ['**']        # cualquier branch → su propio preview
  workflow_dispatch:         # permite lanzarlo a mano

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, gd, zip

      - name: Composer install
        run: cd sdbiosensor-panama && composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node + build de assets
        run: cd sdbiosensor-panama && npm ci && npm run build

      - name: Generar sitio estático (lee Supabase)
        env:
          APP_ENV: local
          APP_DEBUG: 'true'
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: http://localhost
          # Supabase (solo lectura en build). Definir en GitHub → Settings → Secrets.
          DB_CONNECTION: pgsql
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: '5432'
          DB_DATABASE: postgres
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: require
          CACHE_STORE: array
          SESSION_DRIVER: array
          # Sin Sentry en el build estático (no hay runtime PHP en producción).
          SENTRY_LARAVEL_DSN: ''
        run: |
          cd sdbiosensor-panama
          php artisan config:clear
          php artisan serve --port=8000 &
          sleep 3
          echo "=== TEST HOME ROUTE ===" && curl -s http://localhost:8000/ | head -50 || true
          echo "=== LARAVEL LOG ===" && cat storage/logs/laravel.log 2>/dev/null | tail -30 || true
          php artisan export

      - name: Cabeceras de seguridad para Pages
        run: cp sdbiosensor-panama/infra/cloudflare/_headers sdbiosensor-panama/dist/_headers || true

      - name: Publicar en Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy sdbiosensor-panama/dist
            --project-name=sdbiosensor-panama
            --branch=${{ github.ref_name }}
