name: sdbiosensor-panama

services:

  # ----------------------------------------------------------
  # Aplicación PHP (Laravel) — PHP-FPM 8.3
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdb_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8083
      # La conexión a la base de datos (Supabase PostgreSQL) se lee desde .env
      # (DB_CONNECTION, DB_HOST, DB_USERNAME, DB_PASSWORD, DB_SSLMODE).
      # Así los secretos NO quedan en este archivo versionado.
    networks:
      - sdb

  # ----------------------------------------------------------
  # Servidor web — Nginx
  # ----------------------------------------------------------
  web:
    image: nginx:1.27-alpine
    container_name: sdb_web
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sdb

  # ----------------------------------------------------------
  # Base de datos
  # ----------------------------------------------------------
  # MySQL local ELIMINADO: la app ahora usa Supabase (PostgreSQL gestionado).
  # La conexión está en .env. Para recuperar MySQL local, ver el historial
  # de git de este archivo.

  # ----------------------------------------------------------
  # Compilación de assets — Node 20 (Vite)
  # Se ejecuta una vez (npm install + build) y termina.
  # ----------------------------------------------------------
  node:
    image: node:20-alpine
    container_name: sdb_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run build"
    networks:
      - sdb

networks:
  sdb:
    driver: bridge
