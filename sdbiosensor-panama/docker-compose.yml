name: sdbiosensor-panama

services:

  # ----------------------------------------------------------
  # Aplicación PHP (Laravel) — PHP-FPM 8.3
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdb_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8083
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: sdbiosensor_panama
      DB_USERNAME: sdb
      DB_PASSWORD: secret
    networks:
      - sdb

  # ----------------------------------------------------------
  # Servidor web — Nginx
  # ----------------------------------------------------------
  web:
    image: nginx:1.27-alpine
    container_name: sdb_web
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sdb

  # ----------------------------------------------------------
  # Base de datos — MySQL 8
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: sdb_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sdbiosensor_panama
      MYSQL_USER: sdb
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - sdb

  # ----------------------------------------------------------
  # Compilación de assets — Node 20 (Vite)
  # Se ejecuta una vez (npm install + build) y termina.
  # ----------------------------------------------------------
  node:
    image: node:20-alpine
    container_name: sdb_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run build"
    networks:
      - sdb

volumes:
  dbdata:
    driver: local

networks:
  sdb:
    driver: bridge
